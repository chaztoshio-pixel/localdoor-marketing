<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <!-- Design 1: Clean modern — icon left, bold "Local" + light "Door" side by side -->
  <defs>
    <linearGradient id="w1a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#581C87"/>
      <stop offset="50%" stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#DB2777"/>
    </linearGradient>
    <linearGradient id="w1b" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="w1text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#581C87"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>
  </defs>
  <!-- Icon scaled down -->
  <g transform="translate(30, 10) scale(0.35)">
    <path d="M160 460 C160 460 100 200 256 60 C412 200 352 460 352 460 C352 460 320 260 256 160 C192 260 160 460 160 460 Z" fill="url(#w1a)"/>
    <path d="M220 420 C220 420 200 280 256 150 C312 280 292 420 292 420 C292 420 280 300 256 230 C232 300 220 420 220 420 Z" fill="url(#w1b)" opacity="0.9"/>
  </g>
  <!-- Text -->
  <text x="230" y="125" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="80" font-weight="700" fill="#581C87" letter-spacing="-2">Local</text>
  <text x="480" y="125" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="80" font-weight="300" fill="#9333EA" letter-spacing="-2">Door</text>
</svg>